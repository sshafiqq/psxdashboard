async function fetchLivePrice(symbol){
  try{
    const res=await fetch(`https://dps.psx.com.pk/quotes?symbol=${symbol}`,{
      headers:{"Accept":"application/json","X-Requested-With":"XMLHttpRequest"}
    });
    const data=await res.json();
    const q=Array.isArray(data)?data[0]:data;
    if(!q) return null;
    return{
      price:q.currentPrice||q.ldcp||q.close||null,
      change:q.change||null,
      changePct:q.changeP||q.changePct||null,
      high:q.high||null,
      low:q.low||null,
      volume:q.volume||null,
    };
  }catch(e){console.warn("PSX price fetch failed:",e);return null;}
}

async function fetchAllPrices(symbols){
  try{
    // Fetch all at once
    const res=await fetch(`https://dps.psx.com.pk/quotes`,{
      headers:{"Accept":"application/json","X-Requested-With":"XMLHttpRequest"}
    });
    const data=await res.json();
    const results={};
    const arr=Array.isArray(data)?data:Object.values(data);
    for(const q of arr){
      const sym=(q.symbol||q.ticker||"").toUpperCase();
      if(symbols.includes(sym)){
        results[sym]={
          price:q.currentPrice||q.ldcp||q.close||null,
          change:q.change||null,
          changePct:q.changeP||q.changePct||null,
          high:q.high||null,
          low:q.low||null,
          volume:q.volume||null,
        };
      }
    }
    // Fallback — fetch individually for any missing
    for(const s of symbols){
      if(!results[s]){
        const p=await fetchLivePrice(s);
        if(p) results[s]=p;
      }
    }
    return results;
  }catch(e){
    // Fallback to individual fetches
    const results={};
    await Promise.all(symbols.map(async s=>{
      const p=await fetchLivePrice(s);
      if(p) results[s]=p;
    }));
    return results;
  }
}


async function sbReq(path,opts={}){
  const res=await fetch(`${SB_URL}/rest/v1/${path}`,{
    ...opts,
    headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":"application/json","Prefer":opts.prefer||"",...(opts.headers||{})}
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const t=await res.text();return t?JSON.parse(t):null;
}

// ── Claude API ────────────────────────────────────────────────────
async function callClaude(b64,prompt,apiKey,isText){
  if(!apiKey||apiKey.length<10) throw new Error("API key not set");
  const content=isText?[{type:"text",text:prompt}]:[
    {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64.split(",")[1]}},
    {type:"text",text:prompt}
  ];
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:3000,messages:[{role:"user",content}]})
  });
  const data=await resp.json();
  if(data.error) throw new Error(data.error.message);
  const txt=data.content?.find(c=>c.type==="text")?.text||"{}";
  const clean=txt.replace(/```json|```/g,"").trim();
  const start=clean.indexOf("{");const end=clean.lastIndexOf("}");
  if(start===-1||end===-1) throw new Error("No JSON found in response");
  return JSON.parse(clean.slice(start,end+1));
}

      if(als.length>0) built[sym]=als;
    }
    setAlerts(built);
  };

  const checkAlertTriggers=(prices,scriptsData)=>{
    const triggered=[];
    for(const [sym,price] of Object.entries(prices)){
      const cp=parseFloat(price.price);if(isNaN(cp)) continue;
      const sAlerts=alerts[sym]||[];
      for(const al of sAlerts){
        // Extract number from price range like "40.00-41.50"
        const parts=(al.price||"").toString().replace(/[^0-9.-]/g,"").split("-");
        const lo=parseFloat(parts[0]);const hi=parseFloat(parts[1]||parts[0]);
        if(!isNaN(lo)&&cp>=lo&&cp<=(isNaN(hi)?lo*1.02:hi)){
          triggered.push({sym,label:al.label,price:cp,color:al.color});
        }
      }
    }
    if(triggered.length>0){
      triggered.forEach(t=>showToast(`⚡ ${t.sym}: ${t.label} @ Rs ${t.price}`,false));
    }
  };

  // Auto-generate conclusion when both analysis + HM exist

      const row={

        final_verdict:result.finalVerdict||"",
        confidence:result.confidence||"",
        overall_summary:result.overallSummary||"",
        fundamental_score:result.fundamentalScore||"",
        technical_score:result.technicalScore||"",
        hm_score:result.hmScore||"",
        alignment_note:result.alignmentNote||"",

    const row={symbol:name,file_name:file.name,uploaded_at:new Date().toISOString(),b64,date:info.date||"",verdict:info.verdict||"",fundamental_view:info.fundamentalView||"",main_positives:info.mainPositives||"",main_risks:info.mainRisks||"",latest_close:info.latestClose||"",high_20d:info.high20d||"",low_20d:info.low20d||"",dma20:info.dma20||"",dma50:info.dma50||"",dma100:info.dma100||"",rsi:info.rsi||"",atr:info.atr||"",tech_view:info.techView||"",key_levels:JSON.stringify(info.keyLevels||[]),trading_plan:JSON.stringify(info.tradingPlan||[]),fair_value:JSON.stringify(info.fairValue||[]),can_double:info.canDouble||""};

  const deleteScript=async name=>{

    try{

      if(hmData[name]) await sbReq(`hm_scripts?symbol=eq.${encodeURIComponent(name)}`,{method:"DELETE"});
      if(conclusions[name]) await sbReq(`conclusions?symbol=eq.${encodeURIComponent(name)}`,{method:"DELETE"});
      const u={...scripts};delete u[name];setScripts(u);

      const k=Object.keys(u)[0];setSelected(k||null);setSelDate(k?u[k][0]?.date:null);setPdfOpen(false);
      showToast(`${name} deleted`);
    }catch(e){showToast("Delete failed",true);}
  };

    techView:rawEntry.tech_view||"",canDouble:rawEntry.can_double||"",fileName:rawEntry.file_name||"",

  }:null;

  const vs=vStyle(entry?.verdict||"");

  const concVS=vStyle(conc?.final_verdict||"");

  return(
    <div style={{display:"flex",height:"100vh",background:C.bg,color:C.text,fontSize:13,overflow:"hidden"}}>

      {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:999,background:toast.err?C.red:C.green,color:"#fff",padding:"10px 18px",borderRadius:8,fontWeight:600,fontSize:12,boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>{toast.msg}</div>}

      {/* SIDEBAR */}
      <div style={{width:225,minWidth:200,background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"16px 14px 12px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:9}}>
              <div style={{width:28,height:28,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#fff"}}>P</div>
              <div><div style={{fontSize:13,fontWeight:700}}>PSX Tracker</div><div style={{fontSize:10,color:C.textDim}}>Analysis Dashboard</div></div>
            </div>
            <button onClick={()=>{setApiKey(localStorage.getItem("psx-claude-key")||"");setShowSettings(true);}} style={{background:"transparent",border:"none",color:keySet?C.green:C.amber,fontSize:16,cursor:"pointer"}}>⚙</button>

          </div>

        </div>
        <div style={{padding:12,borderTop:`1px solid ${C.border}`}}>

        </div>

          </div>

                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                            <span style={{fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:4,background:`${typeColor}22`,color:typeColor,letterSpacing:0.8}}>{typeLabel}</span>
                            <span style={{fontSize:13,fontWeight:700,color:triggered?al.color:C.text}}>{al.label}</span>
                          </div>
                          <div style={{fontSize:12,color:C.textSub,fontWeight:600}}>Rs {al.price}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          {triggered?(
                            <div style={{fontSize:13,fontWeight:800,color:al.color}}>⚡ IN ZONE!</div>
                          ):cp?(
                            <div>
                              <div style={{fontSize:12,fontWeight:700,color:C.textSub}}>Rs {Math.abs(cp-lo).toFixed(2)}</div>
                              <div style={{fontSize:10,color:C.textDim}}>away</div>
                            </div>
                          ):<div style={{fontSize:12,color:C.textDim}}>—</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Instructions */}
                <div style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                  <div style={{fontSize:10,fontWeight:700,color:C.textDim,letterSpacing:1.3,textTransform:"uppercase",marginBottom:8}}>How Alerts Work</div>
                  <div style={{fontSize:11,color:C.textDim,lineHeight:1.8}}>
                    ⚡ Alert levels are auto-extracted from your trading plan<br/>
                    💰 Click "Refresh Price" to check current price vs levels<br/>
                    🔴 When price enters a zone — it highlights and shows notification<br/>
                    ⚠️ Dashboard must be open in browser for alerts to trigger<br/>
                    🔄 For 24/7 alerts — use TradingView price alerts instead
                  </div>
                </div>
              </>
            )}

            {/* ── ALL SCRIPTS ACTION PLAN TAB ── */}
            {activeTab==="actionplan"&&(
              <>
                <style>{`
                  @media print {
                    body > * { display: none !important; }
                    #printarea { display: block !important; position: fixed !important; top:0; left:0; width:100%; padding:16px; background:white !important; z-index:9999; }
                    #printarea * { color: black !important; background: white !important; -webkit-print-color-adjust: exact; }
                    .print-card { border: 1px solid #999 !important; border-radius:6px !important; padding:10px !important; margin-bottom:10px !important; page-break-inside:avoid; background:white !important; }
                    .print-card table { width:100%; border-collapse:collapse; }
                    .print-card td, .print-card th { border:1px solid #ccc; padding:3px 6px; font-size:10px; color:black !important; }
                    .print-badge { border:1px solid #999 !important; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:700; }
                    .no-print { display:none !important; }
                    .print-title { display:block !important; font-size:16px; font-weight:800; margin-bottom:4px; }
                    .print-date { display:block !important; font-size:11px; color:#666; margin-bottom:12px; }
                  }
                  @media screen { .print-title, .print-date { display:none; } }
                `}</style>

                <div className="no-print" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.text}}>🖨️ All Scripts — Action Plan</div>
                  <button onClick={()=>{
                    const content=document.getElementById("printarea").innerHTML;
                    const w=window.open("","_blank","width=900,height=700");
                    w.document.write(`<!DOCTYPE html><html><head><title>PSX Trading Strategy</title><style>
                      body{font-family:Arial,sans-serif;padding:20px;background:white;color:black;}
                      .script-block{border:1px solid #999;border-radius:4px;padding:10px;margin-bottom:10px;page-break-inside:avoid;}
                      .script-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #ccc;padding-bottom:6px;margin-bottom:6px;}
                      .sym{font-size:15px;font-weight:800;}
                      .price{font-size:14px;font-weight:700;color:#2563EB;}
                      .badge{border:1px solid #999;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:700;margin-left:4px;}
                      .verdict{font-size:10px;font-style:italic;border-left:3px solid #999;padding:3px 6px;margin-bottom:6px;background:#f9f9f9;}
                      .action{font-size:11px;font-weight:700;border-left:3px solid #000;padding:4px 8px;margin-bottom:6px;background:#f0f0f0;}
                      table{width:100%;border-collapse:collapse;font-size:9px;margin-bottom:6px;}
                      th{background:#eee;border:1px solid #ccc;padding:3px 5px;text-align:left;font-size:8px;text-transform:uppercase;}
                      td{border:1px solid #ddd;padding:3px 5px;}
                      .keyrow{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:5px;}
                      .keycell{border:1px solid #ddd;border-radius:3px;padding:3px 5px;}
                      .keylabel{font-size:7px;color:#888;text-transform:uppercase;}
                      .keyval{font-size:10px;font-weight:700;}
                      .notes{font-size:9px;font-style:italic;border-left:2px solid #666;padding-left:5px;margin-top:4px;color:#444;}
                      .pheader{border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:14px;}
                      .ptitle{font-size:16px;font-weight:800;}
                      .pdate{font-size:10px;color:#666;}
                      @media print{body{padding:10px;} .script-block{page-break-inside:avoid;}}
                    </style></head><body>
                    <div class="pheader">
                      <div class="ptitle">PSX Trading Strategy — All Scripts</div>
                      <div class="pdate">Date: ${new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>
                    </div>
                    ${content}
                    </body></html>`);
                    w.document.close();
                    setTimeout(()=>w.print(),500);
                  }} style={{padding:"9px 24px",borderRadius:8,background:C.accent,border:"none",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>🖨️ Print / Save as PDF</button>
                </div>

                <div id="printarea">
                  <div className="print-title">PSX Trading — Action Plan Summary</div>
                  <div className="print-date">Generated: {new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})}</div>

                  {scriptList.map(sym=>{
                    const ents=scripts[sym]||[];
                    const e=ents[0];if(!e) return null;
                    const sv=vStyle(e.verdict||"");
                    const tp=parseJ(e.trading_plan);
                    const hmD=hmData[sym];
                    const hmC=hmSigStyle(hmD?.consensus||"");
                    const concD=conclusions[sym];
                    const concV=vStyle(concD?.final_verdict||"");
                    const lp=livePrices[sym];
                    const price=lp?.price?`Rs ${parseFloat(lp.price).toFixed(2)}`:e.latest_close?`Rs ${e.latest_close}`:"—";
                    return(
                      <div key={sym} className="print-card" style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:18,marginBottom:14}}>
                        {/* Header */}
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                            <span style={{fontSize:18,fontWeight:800,color:C.text}}>{sym}</span>
                            <span className="print-badge" style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:sv.bg,color:sv.color,fontWeight:700}}>{sv.label}</span>
                            {hmD?.consensus&&<span className="print-badge" style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:hmC.bg,color:hmC.color,fontWeight:700}}>HM: {hmD.consensus}</span>}
                            {concD?.final_verdict&&<span className="print-badge" style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:concV.bg,color:concV.color,fontWeight:700}}>🎯 {concD.final_verdict}</span>}
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:16,fontWeight:800,color:C.accent}}>{price}</div>
                            <div style={{fontSize:10,color:C.textDim}}>{e.date}</div>
                          </div>
                        </div>

                        {/* Verdict */}
                        {e.verdict&&<div style={{fontSize:12,color:C.textSub,lineHeight:1.6,marginBottom:10,padding:"7px 10px",background:C.surface2,borderRadius:6,borderLeft:`3px solid ${sv.color}`}}>{e.verdict}</div>}

                        {/* Action Plan */}
                        {concD?.action_plan&&(
                          <div style={{marginBottom:10,padding:"8px 12px",background:`${concV.color}11`,borderRadius:6,border:`1px solid ${concV.color}33`}}>
                            <div style={{fontSize:9,fontWeight:800,color:C.gold,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>⚡ Action Plan</div>
                            <div style={{fontSize:12,fontWeight:600,color:concV.color,lineHeight:1.6}}>{concD.action_plan}</div>
                          </div>
                        )}

                        {/* Trading Plan Table */}
                        {tp.length>0&&(
                          <div style={{marginBottom:10}}>
                            <div style={{fontSize:9,fontWeight:700,color:C.textDim,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Trading Plan</div>
                            <div style={{overflowX:"auto"}}>
                              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                                <thead>
                                  <tr style={{borderBottom:`1px solid ${C.border}`,background:C.surface2}}>
                                    {["Scenario","Entry","Stop Loss","T1","T2","View"].map(h=><th key={h} style={{textAlign:"left",padding:"4px 8px",color:C.textDim,fontWeight:700,fontSize:10,textTransform:"uppercase"}}>{h}</th>)}
                                  </tr>
                                </thead>
                                <tbody>
                                  {tp.map((r,i)=>(
                                    <tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":C.surface2}}>
                                      <td style={{padding:"5px 8px",fontWeight:700,color:C.text,fontSize:11}}>{r.scenario}</td>
                                      <td style={{padding:"5px 8px",color:C.amber,fontWeight:600,fontSize:11}}>{r.entry}</td>
                                      <td style={{padding:"5px 8px",color:C.red,fontWeight:600,fontSize:11}}>{r.stopLoss}</td>
                                      <td style={{padding:"5px 8px",color:C.green,fontWeight:600,fontSize:11}}>{r.target1}</td>
                                      <td style={{padding:"5px 8px",color:C.green,fontWeight:600,fontSize:11}}>{r.target2||"—"}</td>
                                      <td style={{padding:"5px 8px",color:C.textDim,fontSize:10}}>{r.view}</td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          </div>
                        )}

                        {/* Bottom row */}
                        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                          {[
                            ["Stop Loss",concD?.stop_loss?`Rs ${concD.stop_loss}`:"—",C.red],
                            ["Target",concD?.target_price?`Rs ${concD.target_price}`:"—",C.green],
                            ["Time Horizon",concD?.time_horizon||"—",C.gold],
                            ["Top Risk",concD?.top_risk||"—",C.amber],
                          ].map(([l,v,c])=>(
                            <div key={l} style={{background:C.surface2,borderRadius:6,padding:"7px 9px"}}>
                              <div style={{fontSize:9,color:C.textDim,marginBottom:2,textTransform:"uppercase",letterSpacing:0.7}}>{l}</div>
                              <div style={{fontSize:11,fontWeight:600,color:c,lineHeight:1.4}}>{v}</div>
                            </div>
                          ))}
                        </div>

                        {/* Notes */}
                        {myNotes[sym]&&(
                          <div style={{marginTop:8,padding:"7px 10px",background:C.surface2,borderRadius:6,borderLeft:`3px solid ${C.purple}`}}>
                            <div style={{fontSize:9,color:C.textDim,marginBottom:2,textTransform:"uppercase",letterSpacing:0.7}}>My Notes</div>
                            <div style={{fontSize:11,color:C.textSub,lineHeight:1.5}}>{myNotes[sym]}</div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </>
        )}
      </div>

      {/* PDF Panel */}
      {pdfOpen&&entry?.b64&&(
        <div style={{width:480,minWidth:360,background:C.surface,borderLeft:`1px solid ${C.border}`,display:"flex",flexDirection:"column",flexShrink:0}}>
          <div style={{padding:"13px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:13,fontWeight:700}}>{entry.fileName}</div><div style={{fontSize:10,color:C.textDim,marginTop:2}}>{entry.date}</div></div>
            <div style={{display:"flex",gap:8}}>
              <a href={entry.b64} download={entry.fileName} style={{fontSize:11,color:C.accent,background:C.accentDim,padding:"5px 12px",borderRadius:6,textDecoration:"none",fontWeight:600}}>⬇ Download</a>
              <button onClick={()=>setPdfOpen(false)} style={{background:"transparent",border:"none",color:C.textDim,cursor:"pointer",fontSize:14}}>✕</button>
            </div>
          </div>
          <iframe src={entry.b64} style={{flex:1,border:"none",width:"100%"}} title="PDF"/>
        </div>
      )}

      {/* Settings Modal */}
      {showSettings&&(
        <div onClick={e=>{if(e.target===e.currentTarget)setShowSettings(false);}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
          <div style={{background:C.surface,border:`1px solid ${C.border2}`,borderRadius:14,padding:28,width:440,boxShadow:"0 32px 80px rgba(0,0,0,0.7)"}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>⚙ Settings — Claude API Key</div>
            <div style={{fontSize:12,color:C.textDim,marginBottom:20,lineHeight:1.6}}>Get your key from <b style={{color:C.accent}}>console.anthropic.com</b> → API Keys → Create Key.</div>
            <label style={{fontSize:12,color:C.textDim}}>Claude API Key</label>
            <input style={inp} placeholder="sk-ant-..." value={apiKey} onChange={e=>setApiKey(e.target.value)} type="password"/>
            <div style={{fontSize:11,color:C.textDim,marginTop:8,marginBottom:20}}>✓ Saved locally in your browser only.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowSettings(false)} style={{flex:1,padding:"9px 0",borderRadius:8,border:`1px solid ${C.border2}`,background:"transparent",color:C.textDim,fontSize:13,cursor:"pointer"}}>Cancel</button>
              <button onClick={saveApiKey} style={{flex:1,padding:"9px 0",borderRadius:8,background:C.accent,border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Save Key</button>
            </div>
          </div>
        </div>
      )}

      {/* Upload Analysis Modal */}
      {addingAnalysis&&(
        <div onClick={e=>{if(e.target===e.currentTarget){setAddingAnalysis(false);setManualName("");}}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
          <div style={{background:C.surface,border:`1px solid ${C.border2}`,borderRadius:14,padding:28,width:420,boxShadow:"0 32px 80px rgba(0,0,0,0.7)"}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>📊 Upload Analysis PDF</div>
            <div style={{fontSize:12,color:C.textDim,marginBottom:16}}>Claude extracts fundamentals, technicals, trading plan. If HM data also exists, conclusion auto-generates.</div>
            <div style={{marginBottom:14}}><label style={{fontSize:12,color:C.textDim}}>Script name <span style={{opacity:0.6}}>(optional — auto-detected)</span></label><input style={inp} placeholder="e.g. OGDC" value={manualName} onChange={e=>setManualName(e.target.value.toUpperCase())}/></div>
            <UploadZone loading={loadingA} dragOver={dragOverA} setDragOver={setDragOverA} onFiles={handleAnalysisFiles} fileRef={fileRefA} label="Drop Analysis PDF here" hint="or click to browse"/>
            <button onClick={()=>{setAddingAnalysis(false);setManualName("");}} style={{width:"100%",marginTop:12,padding:"9px 0",borderRadius:8,border:`1px solid ${C.border2}`,background:"transparent",color:C.textDim,fontSize:13,cursor:"pointer"}}>Cancel</button>
          </div>
        </div>
      )}

      {/* Upload HM Modal */}
      {addingHM&&(
        <div onClick={e=>{if(e.target===e.currentTarget)setAddingHM(false);}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
          <div style={{background:C.surface,border:`1px solid ${C.pinkDim}`,borderRadius:14,padding:28,width:420,boxShadow:"0 32px 80px rgba(0,0,0,0.7)"}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>📈 Upload HM Indicator PDF</div>
            <div style={{fontSize:12,color:C.textDim,marginBottom:6}}>Uploading for: <b style={{color:C.pink}}>{selected}</b></div>
            <div style={{fontSize:11,color:C.textDim,marginBottom:16,background:C.amberDim,border:`1px solid ${C.amber}`,borderRadius:7,padding:"7px 10px"}}>⚠ Replaces existing HM data. Conclusion will auto-regenerate.</div>
            <UploadZone loading={loadingH} dragOver={dragOverH} setDragOver={setDragOverH} onFiles={handleHMFiles} fileRef={fileRefH} label="Drop HM PDF here" hint="All 4 timeframes extracted automatically"/>
            <button onClick={()=>setAddingHM(false)} style={{width:"100%",marginTop:12,padding:"9px 0",borderRadius:8,border:`1px solid ${C.border2}`,background:"transparent",color:C.textDim,fontSize:13,cursor:"pointer"}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
